name: 🐛 Bug report
description: Report a broken docs page, broken CLI command, or unexpected behavior
labels: [bug, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what's broken.
      placeholder: When I run X, Y happens, but I expected Z.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Where is the bug?
      options:
        - cartwright.app website
        - create-cartwright CLI
        - cartwright template (downstream)
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx create-cartwright@latest my-shop`
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: CLI version (if applicable)
      placeholder: e.g. 0.1.0
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. v22.0.0
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14 / Ubuntu 22.04 / Windows 11 WSL2
