name: ✨ Feature request
description: Suggest a new docs section, CLI flag, or capability
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: I want to do X, but currently can only do Y.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the feature/flag/docs section you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you thought about.
