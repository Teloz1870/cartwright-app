name: Release create-cartwright

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # No if-guard: the Changesets action is internally idempotent — on a
    # release-merge commit it sees no pending changesets and publishes; on
    # a feature commit it opens (or updates) the Version Packages PR; on a
    # no-op commit it exits cleanly. A startsWith("chore: release") guard
    # would (and did, on merge of PR #12) skip the publish run.
    name: Changesets release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter=create-cartwright build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release create-cartwright"
          title: "chore: release create-cartwright"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Both env-vars peger på samme secret. NODE_AUTH_TOKEN bruges af
          # setup-node's auto-genererede .npmrc (NPM_CONFIG_USERCONFIG); uden
          # det indeholder .npmrc literal placeholder-string "XXXXX-XXXXX..."
          # → publish fejler med E404 undefined. NPM_TOKEN bruges af
          # changesets/action selvstændigt hvis det skal regenerere .npmrc.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
